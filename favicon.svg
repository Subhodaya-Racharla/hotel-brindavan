<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a7a4f"/>
      <stop offset="100%" stop-color="#1a5538"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- Leaf shape (main) -->
  <path d="M32 10
           C 32 10, 18 18, 18 32
           C 18 42, 24 52, 32 54
           C 40 52, 46 42, 46 32
           C 46 18, 32 10, 32 10 Z"
        fill="white" opacity="0.95"/>

  <!-- Centre vein -->
  <line x1="32" y1="18" x2="32" y2="50" stroke="#2a7a4f" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Left veins -->
  <line x1="32" y1="24" x2="24" y2="21" stroke="#2a7a4f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="32" y1="31" x2="22" y2="29" stroke="#2a7a4f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="32" y1="38" x2="23" y2="37" stroke="#2a7a4f" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Right veins -->
  <line x1="32" y1="24" x2="40" y2="21" stroke="#2a7a4f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="32" y1="31" x2="42" y2="29" stroke="#2a7a4f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="32" y1="38" x2="41" y2="37" stroke="#2a7a4f" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Orange veg dot (top-right) -->
  <circle cx="51" cy="13" r="7" fill="#f97316"/>
  <circle cx="51" cy="13" r="3.5" fill="white"/>
</svg>
